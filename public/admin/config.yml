# yaml-language-server: $schema=https://unpkg.com/@sveltia/cms/schema/sveltia-cms.json

backend:
  name: github
  repo: fallinov/tutulipe
  branch: main

media_folder: public/images
public_folder: /images

site_url: https://tutulipe.vercel.app

collections:
  # --- Pages ---
  - name: pages
    label: Pages
    files:
      # Page d'accueil
      - name: accueil
        label: Accueil
        file: content/index.md
        fields:
          - { label: Titre SEO, name: title, widget: string }
          - { label: Description SEO, name: description, widget: text }

          # Hero
          - { label: "Hero — Titre", name: hero_title, widget: string }
          - { label: "Hero — Sous-titre", name: hero_subtitle, widget: text }
          - label: "Hero — Image"
            name: hero_image
            widget: image
            media_folder: /public/images
            public_folder: /images
          - { label: "Hero — Bouton (texte)", name: hero_cta_label, widget: string }
          - { label: "Hero — Bouton (lien)", name: hero_cta_link, widget: string }

          # Services
          - { label: "Services — Titre", name: services_title, widget: string }
          - { label: "Services — Sous-titre", name: services_subtitle, widget: text }
          - label: "Services"
            name: services
            widget: list
            summary: "{{title}}"
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Description, name: description, widget: text }
              - label: Icône
                name: icon
                widget: select
                options:
                  - { label: "❤️ Cœur", value: heart }
                  - { label: "🌸 Fleur", value: flower-2 }
                  - { label: "🔥 Flamme", value: flame }
                  - { label: "⭐ Étoile", value: star }
                  - { label: "🎁 Cadeau", value: gift }
                  - { label: "🍃 Feuille", value: leaf }

          # Témoignage
          - { label: "Témoignage — Citation", name: testimonial_quote, widget: text }
          - { label: "Témoignage — Auteur", name: testimonial_author, widget: string }

          # CTA
          - { label: "CTA — Titre", name: cta_title, widget: string }
          - { label: "CTA — Texte", name: cta_text, widget: text }
          - { label: "CTA — Bouton", name: cta_button_label, widget: string }

          # Contenu libre
          - { label: Contenu, name: body, widget: markdown }

      # Page boutique
      - name: boutique
        label: Boutique
        file: content/boutique.md
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Description SEO, name: description, widget: text }
          - { label: Contenu, name: body, widget: markdown }

  # --- Réalisations ---
  - name: realisations
    label: Réalisations
    label_singular: Réalisation
    folder: content/realisations
    create: true
    slug: "{{slug}}"
    sortable_fields: [title, date, category]
    summary: "{{category}} — {{title}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Image
        name: image
        widget: image
        media_folder: /public/images
        public_folder: /images
      - label: Catégorie
        name: category
        widget: select
        options:
          - { label: Mariage, value: Mariage }
          - { label: Deuil, value: Deuil }
          - { label: Décoration, value: Décoration }
          - { label: Événement, value: Événement }
      - label: Date
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
      - { label: Contenu, name: body, widget: markdown }

  # --- Actualités ---
  - name: actualites
    label: Actualités
    label_singular: Article
    folder: content/actualites
    create: true
    slug: "{{slug}}"
    sortable_fields: [title, date]
    summary: "{{date}} — {{title}}"
    fields:
      - { label: Titre, name: title, widget: string }
      - { label: Description, name: description, widget: text }
      - label: Image
        name: image
        widget: image
        media_folder: /public/images
        public_folder: /images
      - label: Date de publication
        name: date
        widget: datetime
        format: "YYYY-MM-DD"
        date_format: "DD.MM.YYYY"
        time_format: false
      - label: Auteur
        name: author
        widget: string
        required: false
      - { label: Contenu, name: body, widget: markdown }
